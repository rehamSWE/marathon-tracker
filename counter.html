<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>عداد الخطوات</title>
    <link rel="stylesheet" href="counter.css" />
  </head>

  <body>
    <h2>👟 ابدأ المشي</h2>

    <div id="steps">0</div>

    <!-- زر البداية -->
    <button onclick="start()">ابدأ</button>

    <!-- زر الإنهاء -->
    <button onclick="finish()">إنهاء</button>

    <script src="counter.js"></script>

    <!-- 🔥 التحكم بالرجوع -->
    <script>
      // إذا ما فيه بيانات → يرجع للبداية
      if (!localStorage.getItem("name")) {
        window.location.replace("index.html");
      }

      // إذا خلص → يروح للشكر
      if (localStorage.getItem("finished")) {
        window.location.replace("thanks.html");
      }
    </script>
  </body>
</html>
