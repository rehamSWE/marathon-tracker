<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عداد الخطوات</title>
    <link rel="stylesheet" href="counter.css" />
  </head>

  <body>

    <div class="container">
    <h2>كــل خـطـوة تـقربـك لهدفـك</h2>
    <div id="steps">0</div>

    <!-- زر واحد فقط -->
    <button id="actionBtn" onclick="handleAction()">ابدأ</button>
    <!-- ➕ النص التحفيزي (إضافة فقط) -->
    <p id="motivationText">هدفنــا 1500 خطوة نحو الأفضل  </p>
    </div>

    <script src="counter.js"></script>

    <!-- 🔥 التحكم بالرجوع -->
    <script>
      // إذا ما فيه بيانات → يرجع للبداية
      if (!localStorage.getItem("name")) {
        window.location.replace("index.html");
      }

      // إذا خلص → يروح للشكر
      if (localStorage.getItem("finished")) {
        window.location.replace("thanks.html");
      }
    </script>
  </body>
</html>
