<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>خطوة نحو الصحة </title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h2>
        نحـو مـجـتـمـع صـحــــي<br />
        كل خـطـوة تصنـع إنــجاز
      </h2>

      <input type="text" id="name" placeholder="الاسم" />

      <input
        type="tel"
        id="phone"
        placeholder="رقم الجوال"
        maxlength="10"
        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
      />

      <button onclick="start()">ســـجـل وابـدأ التـحـدي</button>
    </div>

    <!-- ✅ الشعارات -->
    <div class="logos">
      <img src="logo/logo1.png" />
      <img src="logo/logo2.png" />
      <img src="logo/logo3.png" />
      <img src="logo/logo4.png" />
    </div>

    <script src="script.js"></script>
  </body>
</html>
